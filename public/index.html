<!doctype html>
<html lang="en">
    <head>
        <!-- Set document character encoding -->
        <meta charset="UTF-8" />

        <!-- Ensure proper rendering and touch zooming on mobile devices -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Application description for SEO and social sharing -->
        <meta name="description" content="Pomodoro Focus App is a minimalist tool designed to improve your productivity using the Pomodoro Technique. Alternate between focused work sessions and short breaks to maximize your focus, avoid mental fatigue, and stay motivated throughout the day." />

        <!-- Author of the application -->
        <meta name="author" content="Wilfryn Viloria Rosario" />

        <!-- SEO keywords to improve search engine ranking -->
        <meta name="keywords" content="pomodoro, pomodoro technique, timer, productivity, focus, concentration, time management, study, distraction-free work, task timer, pomodoro app, stopwatch, habit improvement, breaks, deep work, productivity tool" />

        <!-- Canonical URL to avoid duplicate content penalties -->
        <link rel="canonical" href="https://pomodoro-focus-app-wvr.netlify.app" />

        <!-- Preconnect to Google's font servers for performance optimization -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <!-- Import 'Roboto' font from Google Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />

        <!-- Favicon for browser tabs and bookmarks -->
        <link rel="icon" type="image/png" sizes="32x32" href="/build/images/png/favicon-32x32.png" />

        <!-- Link to the main compiled CSS file -->
        <link rel="stylesheet" href="/build/css/index.css" />

        <!-- Title of the web application displayed in browser tab -->
        <title>Pomodoro Focus App | Wilfryn Viloria - Front-End Developer</title>
    </head>
    <body>
        <main>
            <!-- Toolbar at the top containing interactive controls -->
            <section class="toolbar">
                <!-- Button to show/hide the tasks panel -->
                <button class="button toolbar__button toolbar__button--tasks" id="toggle-task-section" aria-label="Open tasks panel"></button>

                <!-- Button to toggle between light and dark themes -->
                <button class="button toolbar__button toolbar__button--theme-toggle" id="toggle-theme" aria-label="Toggle theme"></button>
            </section>

            <!-- Main dashboard containing the task list and the pomodoro timer -->
            <div class="dashboard">
                <!-- Task management section (initially hidden on mobile) -->
                <section class="container tasks hidden" id="tasks">
                    <!-- Decorative line under the header -->
                    <div class="task__header__line"></div>

                    <!-- Header with task titles and icon -->
                    <header class="tasks__header">
                        <section>
                            <h1 class="task__title">Tasks list</h1>
                            <h2 class="task__sub__tittle">Your goals for this session</h2>
                        </section>
                        <figure class="task__icon__container">
                            <svg class="task__icon">
                                <use href="/build/images/svg/sprite.svg#check-icon"></use>
                            </svg>
                        </figure>
                    </header>

                    <!-- Task items will be inserted here dynamically -->
                    <article class="task__container">
                        <ul class="reset-list" id="tasks__container"></ul>
                    </article>

                    <!-- Form to add new tasks -->
                    <footer>
                        <form action="" class="task__form" id="task__form">
                            <input type="text" name="task" placeholder="Add your task" class="task__input task__input--task" id="task__input" />
                            <input type="submit" class="task__input task__input--submit" />
                        </form>
                    </footer>
                </section>

                <!-- Pomodoro timer section -->
                <section class="container timer" id="timer">
                    <!-- Digital clock display -->
                    <article class="timer__clock">
                        <p>25:00</p>
                        <!-- Default countdown starting time -->
                    </article>

                    <!-- Timer control buttons -->
                    <article class="timer__controls">
                        <!-- Start or pause the countdown -->
                        <button class="button timer__button timer__button--time">
                            <svg>
                                <use href="/build/images/svg/sprite.svg#clock-icon-pause"></use>
                            </svg>
                        </button>

                        <!-- Mute or unmute the timer sound -->
                        <button class="button timer__button timer__button--sound">
                            <svg>
                                <use href="/build/images/svg/sprite.svg#sound-icon-pause"></use>
                            </svg>
                        </button>
                    </article>
                </section>
            </div>
        </main>

        <!-- Load main JavaScript file as a module and defer its execution -->
        <script src="/build/scripts/index.js" type="module" defer></script>
    </body>
</html>
